name: 自动双源无损强行合并-备用线

on:
  schedule:
    - cron: '43 0,12 * * *'
  workflow_dispatch: 

# 🌟 显式强制赋予工作流全部写权限，解决 128 报错的关键
permissions: write-all

jobs:
  fetch-and-sync:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout own repo
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Fetch target files
      run: |
        mkdir -p datas
        curl -L "https://cnb.cool/fish2018/xs/-/git/raw/main/api.json" -o datas/cnb.json
        curl -L "https://raw.githubusercontent.com/FGBLH/HKL/refs/heads/main/ok%E6%B5%B7%E8%B1%9A.json" -o datas/haitun.json
        curl -L "https://gh-proxy.com/https://raw.githubusercontent.com/ediart/tvbox/refs/heads/main/lz/py.json" -o datas/lz.json

    - name: Text Merge JSON
      run: |
        python modify_config.py

    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        # 🛠️ 修复：禁止 Git 对中文路径进行转义，彻底解决乱码匹配不到文件的问题
        git config --global core.quotepath false
        
        # 🛠️ 终极改动：直接添加整个 datas 文件夹，不再由于找不到历史文件而导致 Git 崩溃
        git add datas/
        
        # 🛠️ 终极保险：改用 --cached 精准比对暂存区行内容。只有内容真正改变才 commit，即便时间戳变了也绝不误报
        if ! git diff --cached --exit-code --quiet; then
          git commit -m "双源自适应硬核合并 (蝴蝶影视全量版系列): $(date +'%Y-%m-%d %H:%M:%S')"
          git push origin HEAD:${{ github.ref_name }}
        else
          echo "文件内容没有发生实际变化，无需更新，优雅退出。"
        fi
