name: 自动双源无损强行合并-备用线

on:
  schedule:
    - cron: '43 0,12 * * *'
  workflow_dispatch: 

# 🌟 显式强制赋予工作流全部写权限，解决 128 报错的关键
permissions: write-all

jobs:
  fetch-and-sync:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout own repo
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Fetch target files
      run: |
        mkdir -p datas
        curl -L "https://cnb.cool/fish2018/xs/-/git/raw/main/api.json" -o datas/cnb.json
        curl -L "https://raw.githubusercontent.com/FGBLH/HKL/refs/heads/main/ok%E6%B5%B7%E8%B1%9A.json" -o datas/haitun.json
        curl -L "https://gh-proxy.com/https://raw.githubusercontent.com/ediart/tvbox/refs/heads/main/lz/py.json" -o datas/lz.json

    - name: Text Merge JSON
      run: |
        # 编译你生成的 Python 代码
        python modify_config.py

    - name: Prepare Telegram Message and Push
      env:
        TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TG_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        # 1. 检查是否存在高精度对比产生的变动消息
        if [ -f "datas/tg_msg.txt" ]; then
          echo "检测到接口存在实质点播/直播变化，开始组装推送文本..."
          
          # 2. 获取北京时间
          CURRENT_TIME=$(TZ=Asia/Shanghai date "+%Y-%m-%d %H:%M")
          
          # 3. 读取高精度名录变动细节
          DETAIL_MSG=$(cat datas/tg_msg.txt)
          
          # 4. 拼装精准抬头、过渡及尾部广告文案
          MSG="🔔 *老杨TV 全量版接口变更明细通知* 🔔%0A%0A"
          MSG="${MSG}📅 *更新时间*：${CURRENT_TIME} (北京时间)%0A"
          MSG="${MSG}🚀 *变动说明*：检测到上游数据源更新或手工区线路调整，新接口配置已全自动编译上链！%0A%0A"
          MSG="${MSG}${DETAIL_MSG}%0A%0A"
          MSG="${MSG}👑 全量版连接已在后台无缝更新，更新接口即可，若电视端遇到断流请尝试重启软件或及时前往频道（@huliys9）获取当前最新密码锁！"
          
          # 🚀 通过 curl 发射到 Telegram
          if [ ! -z "$TG_TOKEN" ] && [ ! -z "$TG_CHAT_ID" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
              -d "chat_id=${TG_CHAT_ID}" \
              -d "parse_mode=Markdown" \
              -d "text=${MSG}"
            echo "Telegram 推送成功！"
          else
            echo "⚠️ 提示：未检测到绑定的 TG_TOKEN 或 TG_CHAT_ID，跳过通知发送。"
          fi
          
          # 5. 推送完毕后删除临时对比报告，不留脏文件在 Git 库
          rm -f datas/tg_msg.txt
        else
          echo "接口点播/直播无实际内容增减，智能跳过通知推送流程。"
        fi

    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git config --global core.quotepath false
        
        # 检查有没有被更新的老杨TV全量版.json，同步推送到 GitHub 
        git add datas/
        if ! git diff --cached --exit-code --quiet; then
          git commit -m "双源自适应硬核合并 (老杨TV全量版系列): $(date +'%Y-%m-%d %H:%M:%S')"
          git push origin HEAD:${{ github.ref_name }}
        else
          echo "文件内容没有发生实际变化，无需更新，优雅退出。"
        fi
